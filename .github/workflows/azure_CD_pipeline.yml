# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: ADF CD Pipeline

on:
  push:
    branches:
      - adf_publish

jobs:

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Stop all triggers (DEV)
        run: |
          RG="dev-rg-one"
          factory="dev-adf-one-1970496f74b3"

          triggers=$(az datafactory trigger list \
            --resource-group $RG \
            --factory-name $factory \
            --query "[?properties.runtimeState=='Started'].name" -o tsv)

          for t in $triggers; do
            echo "Stopping DEV trigger: $t"

            az datafactory trigger stop \
              --resource-group $RG \
              --factory-name $factory \
              --name $t
          done

      - name: Deploy ARM Template (DEV)
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          resourceGroupName: dev-rg-one
          template: ./dev-adf-one-1970496f74b3/ARMTemplateForFactory.json
          parameters: >
            @./dev-adf-one-1970496f74b3/ARMTemplateParametersForFactory.json
            factoryName=dev-adf-one-1970496f74b3

  deploy-test:
    name: Deploy to TEST
    runs-on: ubuntu-latest

    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Start all triggers (TEST)
        run: |
          RG="test-rg-one"
          factory="test-adf-one-1970496f74b3"

          triggers=$(az datafactory trigger list \
            --resource-group $RG \
            --factory-name $factory \
            --query "[?properties.runtimeState=='Stopped'].name" -o tsv)

          for t in $triggers; do
            echo "Starting TEST trigger: $t"

            az datafactory trigger start \
              --resource-group $RG \
              --factory-name $factory \
              --name $t
          done

      - name: Deploy ARM Template (TEST)
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          resourceGroupName: test-rg-one
          template: ./dev-adf-one-1970496f74b3/ARMTemplateForFactory.json
          parameters: >
            @./dev-adf-one-1970496f74b3/ARMTemplateParametersForFactory.json
            factoryName=test-adf-one-1970496f74b3
            DataLakeStorageGen2Sink_properties_typeProperties_url=https://testac1970496f74b3.dfs.core.windows.net/