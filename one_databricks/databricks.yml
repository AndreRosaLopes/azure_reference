# This is a Databricks asset bundle definition for one_databricks.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: one_databricks
  uuid: f84b1223-796a-4f0d-9498-9c8240111dca

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405609667599018.18.azuredatabricks.net
    variables:
      catalog: one
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-7405609667599018.18.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/andrerosalopes@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Users/andrerosalopes@outlook.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: one
      schema: prod
    permissions:
      - user_name: andrerosalopes@outlook.com
        level: CAN_MANAGE
